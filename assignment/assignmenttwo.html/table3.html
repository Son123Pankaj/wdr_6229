<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Album Selection</title>

    <style>
        body{
            font-family: Arial;
            background:#f2f2f2;
        }

        .container{
            width: 80%;
            margin: auto;
            background: white;
            border: 2px solid #4aa3df;
        }

        .header{
            background: #4aa3df;
            color: white;
            text-align: center;
            padding: 20px;
        }

        h2{
            background: #4aa3df;
            color: white;
            text-align: center;
            padding: 10px;
        }

        .albums{
            display: flex;
            justify-content: space-around;
            padding: 20px;
        }

        .card{
            text-align: center;
        }

        .card img{
            width: 250px;
            height: 180px;
            border-radius: 5px;
        }

        .footer{
            background: #4aa3df;
            color: white;
            text-align: center;
            padding: 10px;
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="header">
            <h1>Album Selection</h1>
            <h3>Choose Your Musical Journey</h3>
        </div>

        <h2>Indian Music</h2>

        <div class="albums">
            <div class="card">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT3fGg33KuieCuoDec57yDDJCiFcNmSLMBSwg&s" alt="Indian Music">
                <h3>Album Title: Indian Melodies</h3>
            </div>

            <div class="card">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTiRu3CHYnGE9Fq69bqI_sOH_zbSdisP6272Q&s" alt="Indian Music">
                <h3>Album Title: Raga Reflections</h3>
            </div>
        </div>

        <h2>Western Music</h2>

        <div class="albums">
            <div class="card">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSDMVQwrZ8vNKR524Sc48IssLPFFGUjqPporw&s" alt="Western Music">
                <h3>Album Title: Symphony Serenade</h3>
            </div>

            <div class="card">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT0kkId-1IqEVcDHUpVevquezDVt4bBisUE5Q&s" alt="Western Music">
                <h3>Album Title: Jazz Jamboree</h3>
            </div>
        </div>

        <div class="footer">
            © 2023 Maharaja Music Company. All rights reserved.
        </div>

    </div>

</body>
</html>
