          <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background:#f4f7fb;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .container{
      background:white;
      padding:40px;
      border-radius:15px;
      box-shadow:0 5px 20px rgba(0,0,0,0.15);
      width:600px;
      height: 700px;
      text-align:center;
    }

    h1{
      font-size:33px;
      color:#444;
      margin-bottom:30px;
      font-weight:bold;
    }

    table{
      width:100%;
      border-collapse:collapse;
      overflow:hidden;
      border-radius:10px;
    }

    th{
      background:#4da3ff;
      color:white;
      padding:15px;
      font-size:20px;
    } 

    td{
      padding:15px;
      border:1px solid #ddd;
      font-size:18px;
    } 

   
  </style>
    </head>

    <body>
        <div class="container">
            <h1>Sample Online Items and Prices</h1>
       
        <table>
            <tr>
            <th>Item</th>
             <th>Price</th>
            </tr>

            <tr>
                <td>Laptop</td>
                <td>$800</td>
            </tr>

             <tr>
                <td>Smartphone</td>
                <td>$400</td>
            </tr>

             <tr>
                <td>Headphone</td>
                <td>$50</td>
            </tr>

             <tr>
                <td>Tablet</td>
                <td>$300</td>
            </tr>
        </table>
         </div>
    </body>
</html>
